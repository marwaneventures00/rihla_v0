  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#wash)" />
  <rect x="4.5" y="4.5" width="55" height="55" rx="17.5" stroke="#EFEFF3" />

  <g filter="url(#soft)" opacity="0.26">
